services:
  - type: web
    name: prava-backend
    env: docker
    rootDir: apps/backend
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: prava_chat
      - key: MONGODB_CONNECT_RETRIES
        value: "5"
      - key: MONGODB_CONNECT_RETRY_DELAY_MS
        value: "2000"
      - key: MONGODB_SERVER_SELECTION_TIMEOUT_MS
        value: "10000"
      - key: JWT_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: EMAIL_REPLY_TO
        sync: false
      - key: APP_NAME
        value: Prava
      - key: APP_PUBLIC_URL
        sync: false
      - key: OTP_EXPIRES_MINUTES
        value: "10"
      - key: ACCESS_TOKEN_TTL_SECONDS
        value: "900"
      - key: REFRESH_TOKEN_TTL_SECONDS
        value: "2592000"
      - key: CORS_ORIGIN
        sync: false
  - type: web
    name: prava-decision-engine
    env: python
    rootDir: decision-engine/feed-ranking/python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
  - type: web
    name: prava-engagement-engine
    env: python
    rootDir: decision-engine/engagement-engine/python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
  - type: web
    name: prava-experimentation-engine
    env: python
    rootDir: decision-engine/experimentation/python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
  - type: web
    name: prava-moderation-engine
    env: python
    rootDir: decision-engine/moderation/python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
  - type: web
    name: prava-trust-safety-engine
    env: python
    rootDir: decision-engine/trust-safety/python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
