
services:
  api:
    build: ./apps/backend
    ports: ["3000:3000", "3100:3000"]
    env_file: [.env]
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/prava
    depends_on: [postgres, redis]

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: prava
    ports: ["5432:5432"]
    volumes:
      - pg-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports: ["6379:6379"]

volumes:
  pg-data:
