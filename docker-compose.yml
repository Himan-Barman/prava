
services:
  api:
    build: ./apps/backend
    ports: ["3000:3000", "3100:3000"]
    env_file: [.env]
    environment:
      - MONGODB_URI=mongodb://mongo:27017/prava_chat
      - MONGODB_DB_NAME=prava_chat
    depends_on: [mongo, redis]

  mongo:
    image: mongo:7
    ports: ["27017:27017"]

  redis:
    image: redis:7
    ports: ["6379:6379"]
