<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PRAVA Splash Animation Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
    }

    /* Phone frame */
    .phone-frame {
      width: 375px;
      height: 812px;
      background: #000;
      border-radius: 40px;
      border: 3px solid #1a1a1a;
      overflow: hidden;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 0 60px rgba(255,255,255,0.03);
    }

    /* Notch */
    .phone-frame::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 150px;
      height: 30px;
      background: #1a1a1a;
      border-radius: 0 0 18px 18px;
      z-index: 10;
    }

    .splash-container {
      display: flex;
      align-items: flex-end;
      gap: 0;
      opacity: 0;
      transform: scale(0.4);
      will-change: transform, opacity;
    }

    .letter {
      font-size: 72px;
      font-weight: 800;
      color: #fff;
      line-height: 1;
      letter-spacing: 1.5px;
      will-change: transform, opacity;
    }

    .letter-p {
      opacity: 0;
    }

    .letter-reveal {
      opacity: 0;
      transform: translateX(24px);
    }

    .dot {
      width: 14px;
      height: 14px;
      background: #fff;
      border-radius: 50%;
      margin-left: 4px;
      margin-bottom: 10px;
      opacity: 0;
      transform: scale(0);
      will-change: transform, opacity;
    }

    /* ═══════ ANIMATIONS ═══════ */

    /* Phase 1: Container appears */
    @keyframes containerIn {
      0% { opacity: 0; transform: scale(0.4); }
      60% { opacity: 1; transform: scale(1.05); }
      100% { opacity: 1; transform: scale(1.0); }
    }

    /* Phase 1: P fades in with scale */
    @keyframes pFadeIn {
      0% { opacity: 0; transform: scale(0.5); }
      50% { opacity: 1; }
      80% { transform: scale(1.03); }
      100% { opacity: 1; transform: scale(1.0); }
    }

    /* Phase 1: Dot bounces in */
    @keyframes dotBounce {
      0% { opacity: 0; transform: scale(0); }
      40% { opacity: 1; transform: scale(1.4); }
      60% { transform: scale(0.85); }
      80% { transform: scale(1.1); }
      100% { opacity: 1; transform: scale(1.0); }
    }

    /* Phase 2: Glow pulse */
    @keyframes glowPulse {
      0% { text-shadow: 0 0 0 transparent; }
      50% {
        text-shadow:
          0 0 20px rgba(255,255,255,0.4),
          0 0 40px rgba(255,255,255,0.2);
      }
      100% { text-shadow: 0 0 0 transparent; }
    }

    @keyframes dotGlowPulse {
      0% { box-shadow: 0 0 0 transparent; }
      50% {
        box-shadow:
          0 0 14px rgba(255,255,255,0.5),
          0 0 28px rgba(255,255,255,0.2);
      }
      100% { box-shadow: 0 0 0 transparent; }
    }

    /* Phase 3: Slide container left */
    @keyframes slideLeft {
      0% { transform: translateX(0) scale(1); }
      100% { transform: translateX(-58px) scale(1); }
    }

    /* Phase 3: Letters cascade in */
    @keyframes letterReveal {
      0% { opacity: 0; transform: translateX(24px); }
      60% { opacity: 1; }
      100% { opacity: 1; transform: translateX(0); }
    }

    /* Phase 4: Final glow + zoom */
    @keyframes finalZoom {
      0% { transform: translateX(-58px) scale(1.0); }
      50% { transform: translateX(-58px) scale(1.06); }
      100% { transform: translateX(-58px) scale(1.04); }
    }

    @keyframes finalGlowText {
      0% { text-shadow: 0 0 0 transparent; }
      60% {
        text-shadow:
          0 0 18px rgba(255,255,255,0.5),
          0 0 36px rgba(255,255,255,0.25);
      }
      100% {
        text-shadow:
          0 0 12px rgba(255,255,255,0.3),
          0 0 28px rgba(255,255,255,0.15);
      }
    }

    @keyframes finalGlowDot {
      0% { box-shadow: 0 0 0 transparent; }
      60% {
        box-shadow:
          0 0 14px rgba(255,255,255,0.6),
          0 0 30px rgba(255,255,255,0.3);
      }
      100% {
        box-shadow:
          0 0 10px rgba(255,255,255,0.3),
          0 0 22px rgba(255,255,255,0.15);
      }
    }

    /* Phase 5: Fade out */
    @keyframes fadeOut {
      0% { opacity: 1; }
      100% { opacity: 0; }
    }

    /* ═══════ ACTIVE CLASSES ═══════ */

    .splash-container.phase1 {
      animation: containerIn 700ms cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    .splash-container.phase1 .letter-p {
      animation: pFadeIn 700ms cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }
    .splash-container.phase1 .dot {
      animation: dotBounce 700ms 250ms cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    .splash-container.phase2 .letter-p {
      animation: glowPulse 500ms ease-in-out forwards;
    }
    .splash-container.phase2 .dot {
      animation: dotGlowPulse 500ms ease-in-out forwards;
    }

    .splash-container.phase3 {
      animation: slideLeft 400ms cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }
    .splash-container.phase3 .letter-r { animation: letterReveal 350ms 100ms cubic-bezier(0.22, 1, 0.36, 1) forwards; }
    .splash-container.phase3 .letter-a1 { animation: letterReveal 350ms 200ms cubic-bezier(0.22, 1, 0.36, 1) forwards; }
    .splash-container.phase3 .letter-v { animation: letterReveal 350ms 300ms cubic-bezier(0.22, 1, 0.36, 1) forwards; }
    .splash-container.phase3 .letter-a2 { animation: letterReveal 350ms 400ms cubic-bezier(0.22, 1, 0.36, 1) forwards; }

    .splash-container.phase4 {
      animation: finalZoom 600ms ease-in-out forwards;
    }
    .splash-container.phase4 .letter {
      animation: finalGlowText 600ms ease-in-out forwards;
    }
    .splash-container.phase4 .dot {
      animation: finalGlowDot 600ms ease-in-out forwards;
    }

    .splash-container.phase5 {
      animation: fadeOut 500ms ease-in forwards;
    }

    /* ═══════ Controls ═══════ */
    .controls {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
    }

    .replay-btn {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.5);
      padding: 10px 28px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 8px;
      transition: all 0.3s ease;
    }
    .replay-btn:hover {
      border-color: rgba(255,255,255,0.5);
      color: rgba(255,255,255,0.8);
      background: rgba(255,255,255,0.05);
    }

    .label {
      position: fixed;
      top: 30px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.15);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="label">PRAVA · SPLASH ANIMATION PREVIEW</div>

  <div class="phone-frame">
    <div class="splash-container" id="splash">
      <span class="letter letter-p">P</span>
      <span class="letter letter-reveal letter-r">R</span>
      <span class="letter letter-reveal letter-a1">A</span>
      <span class="letter letter-reveal letter-v">V</span>
      <span class="letter letter-reveal letter-a2">A</span>
      <div class="dot"></div>
    </div>
  </div>

  <div class="controls">
    <button class="replay-btn" onclick="replay()">↻ Replay Animation</button>
  </div>

  <script>
    const splash = document.getElementById('splash');
    const phases = ['phase1', 'phase2', 'phase3', 'phase4', 'phase5'];
    const durations = [950, 500, 900, 600, 800]; // ms per phase

    function clearPhases() {
      phases.forEach(p => splash.classList.remove(p));
      splash.style.opacity = '0';
      splash.style.transform = 'scale(0.4)';

      // Reset letter states
      const reveals = splash.querySelectorAll('.letter-reveal');
      reveals.forEach(el => {
        el.style.opacity = '0';
        el.style.transform = 'translateX(24px)';
      });

      const p = splash.querySelector('.letter-p');
      p.style.opacity = '0';

      const dot = splash.querySelector('.dot');
      dot.style.opacity = '0';
      dot.style.transform = 'scale(0)';
    }

    async function runAnimation() {
      clearPhases();
      await sleep(200);

      for (let i = 0; i < phases.length; i++) {
        // Remove previous phase class (except keep visible states)
        if (i > 0) splash.classList.remove(phases[i - 1]);

        // For phase 2+, preserve visibility from phase 1
        if (i >= 1) {
          splash.style.opacity = '1';
          splash.style.transform = 'scale(1)';
          splash.querySelector('.letter-p').style.opacity = '1';
          splash.querySelector('.dot').style.opacity = '1';
          splash.querySelector('.dot').style.transform = 'scale(1)';
        }

        // For phase 3+, keep P centered visibility
        if (i >= 2) {
          // letters already handled by animation
        }

        // For phase 4+, preserve revealed letters
        if (i >= 3) {
          splash.querySelectorAll('.letter-reveal').forEach(el => {
            el.style.opacity = '1';
            el.style.transform = 'translateX(0)';
          });
        }

        splash.classList.add(phases[i]);
        await sleep(durations[i]);
      }
    }

    function replay() {
      runAnimation();
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    // Auto-play on load
    window.addEventListener('load', () => {
      setTimeout(runAnimation, 300);
    });
  </script>
</body>
</html>
